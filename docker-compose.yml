version: '3.8'

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mango-web
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=https://mango-api.tylerdurden.eu.org
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: mango-network
